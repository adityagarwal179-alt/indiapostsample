<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Logistics Admin & Tracking Panel</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            padding: 20px;
            background: #1e3a8a;
            color: white;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        @media (max-width: 768px) {
            .grid { grid-template-columns: 1fr; }
        }
        .card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border: 1px solid #e5e7eb;
        }
        .card-tracking {
            background: #fffbeb;
            border: 2px solid #d97706;
            grid-column: 1 / -1;
        }
        h2 {
            margin-top: 0;
            color: #1e3a8a;
            border-bottom: 2px solid #e5e7eb;
            padding-bottom: 10px;
        }
        .card-tracking h2 { color: #b45309; border-bottom-color: #fef3c7; }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            font-size: 14px;
        }
        input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 14px;
        }
        .inline-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }
        .btn-primary { background: #2563eb; color: white; }
        .btn-primary:hover { background: #1d4ed8; }
        .btn-success { background: #10b981; color: white; }
        .btn-success:hover { background: #059669; }
        .btn-warning { background: #d97706; color: white; }
        .btn-warning:hover { background: #b45309; }
        
        /* Modal Alert Styling */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center; align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            padding: 25px;
            border-radius: 8px;
            text-align: center;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        .modal-content h3 { margin-top: 0; }
        .modal-btn {
            margin-top: 15px;
            background: #1e3a8a;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Global Logistics Network Portal</h1>
        <p>Live Database Synchronization System</p>
    </div>

    <div class="grid">
        <div class="card card-tracking">
            <h2>🔍 Public Tracking Interface (Cloud Connected)</h2>
            <div class="form-group">
                <label for="searchTrackId">Enter Tracking ID to Track Live Status</label>
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="searchTrackId" placeholder="e.g., EM619883938IN" style="flex: 2; font-weight: bold; text-transform: uppercase;">
                    <button class="btn-warning" id="btnTrack" style="flex: 1;">Track Package</button>
                </div>
            </div>
        </div>

        <div class="card">
            <h2>📦 1. Create / Generate Tracking ID</h2>
            <div class="form-group">
                <label for="orderType">Order Type</label>
                <select id="orderType">
                    <option value="Consignment">Consignment</option>
                    <option value="Express Cargo">Express Cargo</option>
                    <option value="Document Courier">Document Courier</option>
                </select>
            </div>
            <div class="form-group">
                <label for="trackId">Tracking ID (Auto Generated or Custom)</label>
                <input type="text" id="trackId" readonly style="background: #eef2f6; font-weight: bold; color: #1e3a8a;">
            </div>
            <div class="inline-group">
                <div class="form-group">
                    <label for="originOffice">Origin Office</label>
                    <input type="text" id="originOffice" value="Delhi GPO">
                </div>
                <div class="form-group">
                    <label for="originPin">Origin PIN</label>
                    <input type="text" id="originPin" value="110001">
                </div>
            </div>
            <div class="inline-group">
                <div class="form-group">
                    <label for="destOffice">Destination Office</label>
                    <input type="text" id="destOffice" placeholder="e.g., Mumbai Hub">
                </div>
                <div class="form-group">
                    <label for="destPin">Destination PIN</label>
                    <input type="text" id="destPin" placeholder="e.g., 400001">
                </div>
            </div>
            <button class="btn-primary" id="btnSaveUpload">Save & Upload to Cloud</button>
        </div>

        <div class="card">
            <h2>⚡ 2. Update Live Status & Routing Location</h2>
            <div class="form-group">
                <label for="activeTrackId">Select Active ID (Generated Above)</label>
                <input type="text" id="activeTrackId" readonly style="background: #eef2f6; font-weight: bold;">
            </div>
            <div class="form-group">
                <label for="currentStatus">Change Current Status Stage</label>
                <select id="currentStatus">
                    <option value="Shipment Booked">Shipment Booked</option>
                    <option value="Arrived at Origin Facility">Arrived at Origin Facility</option>
                    <option value="In Transit to Destination">In Transit to Destination</option>
                    <option value="Arrived at Delivery Hub">Arrived at Delivery Hub</option>
                    <option value="Out for Delivery">Out for Delivery</option>
                    <option value="Successfully Delivered">Successfully Delivered</option>
                </select>
            </div>
            <div class="form-group">
                <label for="currentLocation">Current Routing Location (City/Hub)</label>
                <input type="text" id="currentLocation" placeholder="e.g., Jaipur Transit Center">
            </div>
            <button class="btn-success" id="btnPushUpdate">Push Global Update</button>
        </div>
    </div>
</div>

<div class="modal" id="customAlert">
    <div class="modal-content">
        <h3 id="alertTitle">Notification</h3>
        <p id="alertMessage">Message text goes here.</p>
        <button class="modal-btn" onclick="closeModal()">OK</button>
    </div>
</div>

    <script>
    // सटीक KVDB क्लाउड डेटाबेस यूआरएल
    const CLOUD_API_URL = "https://kvdb.io/9vBh7SXWV8hsoqKmP3WzEF";

    window.onload = function() {
        generateNewTrackingID();
    };

    function generateNewTrackingID() {
        const randomDigits = Math.floor(100000000 + Math.random() * 900000000);
        const generatedID = `EM${randomDigits}IN`;
        document.getElementById('trackId').value = generatedID;
        document.getElementById('activeTrackId').value = generatedID;
    }

    function showAlert(title, message) {
        document.getElementById('alertTitle').innerText = title;
        document.getElementById('alertMessage').innerText = message;
        document.getElementById('customAlert').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('customAlert').style.display = 'none';
    }

    // एक्शन 1: डेटाबेस में नया शिपमेंट बनाना
    document.getElementById('btnSaveUpload').addEventListener('click', async function() {
        const trackId = document.getElementById('trackId').value.trim();
        const orderType = document.getElementById('orderType').value;
        const originOffice = document.getElementById('originOffice').value.trim();
        const originPin = document.getElementById('originPin').value.trim();
        const destOffice = document.getElementById('destOffice').value.trim();
        const destPin = document.getElementById('destPin').value.trim();

        if(!destOffice || !destPin) {
            showAlert("⚠️ Missing Information", "Please enter Destination Office and Destination PIN.");
            return;
        }

        const payload = {
            trackId: trackId,
            orderType: orderType,
            originOffice: originOffice,
            originPin: originPin,
            destOffice: destOffice,
            destPin: destPin,
            currentStatus: "Shipment Booked",
            currentLocation: originOffice,
            lastUpdated: new Date().toLocaleString()
        };

        try {
            // CORS ब्लॉक से बचने के लिए text/plain मोड का उपयोग
            const response = await fetch(`${CLOUD_API_URL}/${trackId}`, {
                method: 'POST',
                mode: 'no-cors', // यह ब्राउज़र को ब्लॉक करने से रोकता है
                body: JSON.stringify(payload)
            });

            // no-cors मोड में हमेशा सफलता मान ली जाती है क्योंकि सर्वर रिस्पॉन्स छुपा देता है
            showAlert("✅ Cloud Sync Request Sent", `Tracking ID: ${trackId} has been submitted! Please proceed to Section 2 to push updates.`);
            document.getElementById('activeTrackId').value = trackId;
            
        } catch (error) {
            showAlert("❌ Connection Error", "Database communication failed. Please try again.");
            console.error(error);
        }
    });

    // एक्शन 2: लाइव स्टेटस अपडेट करना
    document.getElementById('btnPushUpdate').addEventListener('click', async function() {
        const trackId = document.getElementById('activeTrackId').value.trim();
        const currentStatus = document.getElementById('currentStatus').value;
        const currentLocation = document.getElementById('currentLocation').value.trim();

        if(!currentLocation) {
            showAlert("⚠️ Missing Location", "Please enter the current routing location center name.");
            return;
        }

        // पहले से मौजूद डेटा का ढांचा दोबारा तैयार करना ताकि पुराना डेटा गायब न हो
        const orderType = document.getElementById('orderType').value;
        const originOffice = document.getElementById('originOffice').value.trim();
        const originPin = document.getElementById('originPin').value.trim();
        const destOffice = document.getElementById('destOffice').value.trim();
        const destPin = document.getElementById('destPin').value.trim();

        const updatedPayload = {
            trackId: trackId,
            orderType: orderType,
            originOffice: originOffice,
            originPin: originPin,
            destOffice: destOffice,
            destPin: destPin,
            currentStatus: currentStatus,
            currentLocation: currentLocation,
            lastUpdated: new Date().toLocaleString()
        };

        try {
            const postRes = await fetch(`${CLOUD_API_URL}/${trackId}`, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(updatedPayload)
            });

            showAlert("⚡ Global Update Pushed", `Status for ${trackId} updated to "${currentStatus}".`);
        } catch (error) {
            showAlert("❌ Process Error", "An error occurred while pushing updates.");
            console.error(error);
        }
    });

    // एक्शन 3: पब्लिक ट्रैकिंग इंटरफ़ेस
    document.getElementById('btnTrack').addEventListener('click', async function() {
        const searchId = document.getElementById('searchTrackId').value.trim().toUpperCase();

        if(!searchId) {
            showAlert("⚠️ Input Empty", "Please type a Tracking ID to check.");
            return;
        }

        try {
            // डेटा फेच करते समय कैशिंग से बचने के लिए रैंडम स्ट्रिंग जोड़ना
            const response = await fetch(`${CLOUD_API_URL}/${searchId}?nocache=${Date.now()}`);
            
            if(!response.ok) {
                showAlert("❌ Tracking ID Not Found", "ID not found in database or server limit reached! Double check your input.");
                return;
            }

            const data = await response.json();
            
            const resultHtml = `
              📌 Order Type: ${data.orderType || 'N/A'}\n
              📍 Route: ${data.originOffice || ''} ➡️ ${data.destOffice || ''}\n
              ⚡ LIVE STATUS: ${data.currentStatus || 'Processing'}\n
              🏢 Current Hub: ${data.currentLocation || 'In Transit'}\n
              🕒 Last Update: ${data.lastUpdated || 'Just Now'}
            `;
            
            showAlert("📦 Live Tracking Results Found", resultHtml);

        } catch (error) {
            showAlert("❌ Search Failure", "Tracking ID not found in global database! Double check your input value.");
            console.error(error);
        }
    });
</script>

</body>
</html>
